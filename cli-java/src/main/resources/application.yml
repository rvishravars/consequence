spring:
  shell:
    interactive:
      enabled: true
    script:
      enabled: true

consequence:
  agent:
    # Base URL of the OpenAI-compatible chat-completions endpoint.
    # Ollama local:  http://localhost:11434/v1
    # OpenAI:        https://api.openai.com/v1
    base-url: ${AGENT_BASE_URL:http://localhost:11434/v1}

    # API key (leave blank for local models that don't require one).
    api-key: ${AGENT_API_KEY:}

    # Model name to send in the request body.
    model: ${AGENT_MODEL:gemma4}

    # HTTP call timeout in seconds.
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:60}

logging:
  level:
    com.consequence: INFO
