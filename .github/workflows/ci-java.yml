name: Java CI

on:
  push:
    paths:
      - 'cli-java/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    paths:
      - 'cli-java/**'
      - '.github/workflows/ci-java.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli-java

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn -B package --file pom.xml
