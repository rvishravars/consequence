name: Python CI

on:
  push:
    paths:
      - 'evaluator-python/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    paths:
      - 'evaluator-python/**'
      - '.github/workflows/ci-python.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./evaluator-python

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run tests
        run: pytest
