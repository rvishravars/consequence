services:
  java-cli:
    build:
      context: ./cli-java
      dockerfile: Dockerfile
    volumes:
      - .:/data
    working_dir: /data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_BASE_URL=${AGENT_BASE_URL:-http://host.docker.internal:11434/v1}
      - AGENT_API_KEY=${AGENT_API_KEY:-}
      - AGENT_MODEL=${AGENT_MODEL:-gemma4}

  python-eval:
    build:
      context: ./evaluator-python
      dockerfile: Dockerfile
    volumes:
      - .:/data
    working_dir: /data
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENT_BASE_URL=${AGENT_BASE_URL:-http://host.docker.internal:11434/v1}
      - AGENT_MODEL=${AGENT_MODEL:-gemma4}
      - JUDGE_BASE_URL=${JUDGE_BASE_URL:-http://host.docker.internal:11434/v1}
      - JUDGE_MODEL=${JUDGE_MODEL:-llama3.2}
